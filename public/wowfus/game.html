<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>IsoForge — Monde</title>
<style>
  :root { color-scheme: dark; --gold: #d9b25a; --panel: rgba(14,18,26,.85); --line: rgba(217,178,90,.35); --ink: #e8e2d4; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden; background: #8fb7d6;
    font-family: ui-sans-serif, system-ui, "Segoe UI", Roboto, sans-serif; color: var(--ink); }
  #app { position: fixed; inset: 0; display: block; }
  #hud { position: fixed; inset: 0; pointer-events: none; }
  #hud > * { pointer-events: auto; }

  #topbar { position: absolute; top: 12px; left: 12px; background: var(--panel); border: 1px solid var(--line);
    border-radius: 10px; padding: 8px 14px; backdrop-filter: blur(6px); font-weight: 700; }
  #topbar small { color: var(--gold); font-weight: 600; letter-spacing: .5px; }

  #bottombar { position: absolute; left: 50%; bottom: 16px; transform: translateX(-50%);
    display: flex; align-items: center; gap: 16px; background: var(--panel); border: 1px solid var(--line);
    border-radius: 14px; padding: 10px 16px; backdrop-filter: blur(6px); }
  .stat { display: flex; align-items: center; gap: 8px; font-weight: 800; letter-spacing: 1px; }
  .stat .tag { font-size: 11px; opacity: .7; }
  .stat b { font-size: 22px; min-width: 22px; text-align: center; }
  .stat.pm b { color: #6fb6ff; }
  .stat.pa b { color: #f0a44b; }
  .sep { width: 1px; height: 28px; background: var(--line); }
  #endturn { pointer-events: auto; border: 1px solid #efd89a; border-radius: 10px; padding: 10px 18px;
    cursor: pointer; font-weight: 800; letter-spacing: .5px; background: linear-gradient(180deg, #e6c578, #c79a3e); color: #2a2210; }
  #endturn:hover { filter: brightness(1.07); }

  #spellbar { position: absolute; left: 50%; bottom: 78px; transform: translateX(-50%); display: flex; gap: 8px; }
  .spell { pointer-events: auto; min-width: 96px; border: 1px solid var(--line); border-radius: 10px;
    padding: 7px 10px 6px; background: var(--panel); backdrop-filter: blur(6px); cursor: pointer; color: var(--ink);
    text-align: center; transition: transform .08s ease, border-color .12s; }
  .spell:hover { transform: translateY(-2px); }
  .spell.sel { border-color: var(--gold); box-shadow: 0 0 0 1px var(--gold), 0 0 14px rgba(217,178,90,.45); }
  .spell.disabled { opacity: .4; cursor: not-allowed; }
  .spell .nm { font-size: 12px; font-weight: 700; white-space: nowrap; }
  .spell .meta { font-size: 10px; opacity: .82; margin-top: 2px; }
  .spell .key { display: inline-block; min-width: 13px; color: var(--gold); font-weight: 800; }
  .stat.hp b { color: #6fd06a; }
  #fct { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
  .fct { position: absolute; font-weight: 800; font-size: 21px; transform: translate(-50%, -50%);
    text-shadow: 0 2px 5px rgba(0,0,0,.65); animation: fct .95s ease-out forwards; will-change: transform, opacity; }
  @keyframes fct { 0% { opacity: 0; } 14% { opacity: 1; } 100% { opacity: 0; transform: translate(-50%, -165%); } }
  #hint { position: absolute; right: 12px; bottom: 16px; background: var(--panel); border: 1px solid var(--line);
    border-radius: 10px; padding: 8px 12px; font-size: 12px; max-width: 40ch; opacity: .9; }
  #back { position: absolute; top: 12px; right: 12px; pointer-events: auto; border: 1px solid var(--line);
    background: var(--panel); color: var(--ink); border-radius: 10px; padding: 8px 14px; cursor: pointer; font-weight: 700; }
  #err { position: fixed; left: 12px; bottom: 70px; max-width: 60ch; font: 12px/1.4 ui-monospace, monospace;
    color: #fff; background: #922; padding: 8px 10px; border-radius: 8px; white-space: pre-wrap; display: none; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>
  <canvas id="app"></canvas>
  <div id="hud">
    <div id="topbar"><small>EN JEU</small> · <span id="who">Héros — Guerrier</span></div>
    <button id="back">Création</button>
    <div id="spellbar"></div>
    <div id="bottombar">
      <div class="stat hp"><span class="tag">PV</span><b id="hp">30</b></div>
      <div class="sep"></div>
      <div class="stat pm"><span class="tag">PM</span><b id="pm">4</b></div>
      <div class="sep"></div>
      <div class="stat pa"><span class="tag">PA</span><b id="pa">6</b></div>
      <div class="sep"></div>
      <button id="endturn">Fin du tour</button>
    </div>
    <div id="hint">Choisis un <b style="color:#d9b25a">sort</b> (clic ou touches 1-3) puis clique une case <b style="color:#e08a3a">orange</b> · case <b style="color:#6fb6ff">bleue</b> = déplacement · molette: zoom · clic-droit: vue · Échap: annuler</div>
  </div>
  <div id="fct"></div>
  <div id="err"></div>

  <script>
    document.getElementById('back').onclick = () => { location.href = './create.html'; };
    addEventListener('error', (e) => {
      const el = document.getElementById('err');
      el.style.display = 'block';
      el.textContent = 'Error: ' + (e.message || (e.error && e.error.message) || e.type);
    });
  </script>
  <script type="module" src="./src/game.js"></script>
</body>
</html>
